name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v1.0.0"
        required: true
        type: string
  push:
    tags:
      - "**"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          tag="${tag#refs/tags/}"
          ref="refs/tags/${tag}"
          docker_tag="${tag//\//-}"
          docker_tag="${docker_tag//+/-}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"
          printf 'ref=%s\n' "${ref}" >> "${GITHUB_OUTPUT}"
          printf 'docker_tag=%s\n' "${docker_tag}" >> "${GITHUB_OUTPUT}"
          printf 'image=%s\n' "${image}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve checked out revision
        id: revision
        shell: bash
        run: printf 'sha=%s\n' "$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: pkg/webadmin/ui/package-lock.json

      - name: Build embedded admin UI
        working-directory: pkg/webadmin/ui
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21.x"
          cache: true

      - name: Vet Go packages
        run: go vet ./...

      - name: Test Go packages
        run: go test ./...

      - name: Build cross-platform binaries
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG//\//-}"
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="natives3bridge-${version}-${goos}-${goarch}"
            binary="${name}/natives3bridge"

            if [[ "${goos}" == "windows" ]]; then
              binary="${binary}.exe"
            fi

            mkdir -p "dist/${name}/configs"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags "-s -w" \
              -o "dist/${binary}" \
              ./cmd/natives3bridge

            cp README.md "dist/${name}/"
            cp configs/config.example.yaml "dist/${name}/configs/"

            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.release.outputs.image }}:${{ steps.release.outputs.docker_tag }}
            ${{ steps.release.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
