name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string
      source_ref:
        description: "Optional branch, tag, or commit to build. Defaults to the commit that triggered the workflow."
        required: false
        type: string
  push:
    tags:
      - "**"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          tag="${tag#refs/tags/}"
          source_ref="${INPUT_SOURCE_REF:-${GITHUB_SHA}}"
          docker_tag="${tag//\//-}"
          docker_tag="${docker_tag//+/-}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ -z "${tag}" ]]; then
            echo "::error::Release tag is required."
            exit 1
          fi

          if ! git check-ref-format "refs/tags/${tag}"; then
            echo "::error::Invalid release tag: ${tag}"
            exit 1
          fi

          if [[ -z "${source_ref}" ]]; then
            echo "::error::Source ref is required."
            exit 1
          fi

          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"
          printf 'source_ref=%s\n' "${source_ref}" >> "${GITHUB_OUTPUT}"
          printf 'docker_tag=%s\n' "${docker_tag}" >> "${GITHUB_OUTPUT}"
          printf 'image=%s\n' "${image}" >> "${GITHUB_OUTPUT}"

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.source_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve checked out revision
        id: revision
        shell: bash
        run: printf 'sha=%s\n' "$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag target
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.revision.outputs.sha }}
        run: |
          set -euo pipefail

          remote_ref="refs/tags/${RELEASE_TAG}"

          if git ls-remote --exit-code --refs origin "${remote_ref}" >/dev/null; then
            git fetch --force origin "${remote_ref}:${remote_ref}"
            existing_sha="$(git rev-list -n 1 "${remote_ref}")"

            if [[ "${existing_sha}" != "${RELEASE_SHA}" ]]; then
              echo "::error::Tag ${RELEASE_TAG} already exists at ${existing_sha}, but this run checked out ${RELEASE_SHA}."
              echo "::error::Select ${remote_ref} as source_ref to rebuild that tag, or use a new release tag."
              exit 1
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: pkg/webadmin/ui/package-lock.json

      - name: Build embedded admin UI
        working-directory: pkg/webadmin/ui
        env:
          APP_VERSION: ${{ steps.release.outputs.tag }}
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21.x"
          cache: true

      - name: Vet Go packages
        run: go vet ./...

      - name: Test Go packages
        run: go test ./...

      - name: Build cross-platform binaries
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG//\//-}"
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="natives3bridge-${version}-${goos}-${goarch}"
            binary="${name}/natives3bridge"

            if [[ "${goos}" == "windows" ]]; then
              binary="${binary}.exe"
            fi

            mkdir -p "dist/${name}/configs"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags "-s -w" \
              -o "dist/${binary}" \
              ./cmd/natives3bridge

            cp README.md "dist/${name}/"
            cp configs/config.example.yaml "dist/${name}/configs/"

            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.release.outputs.tag }}
          tags: |
            ${{ steps.release.outputs.image }}:${{ steps.release.outputs.docker_tag }}
            ${{ steps.release.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.revision.outputs.sha }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
