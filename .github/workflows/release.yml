name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string
      source_ref:
        description: "Optional branch, tag, or commit to build. Defaults to the commit that triggered the workflow."
        required: false
        type: string
  push:
    tags:
      - "**"

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
      docker_tag: ${{ steps.metadata.outputs.docker_tag }}
      namespace: ${{ steps.metadata.outputs.namespace }}
      sha: ${{ steps.revision.outputs.sha }}

    steps:
      - name: Resolve release metadata
        id: metadata
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          tag="${tag#refs/tags/}"
          source_ref="${INPUT_SOURCE_REF:-${GITHUB_SHA}}"
          version="${tag//\//-}"
          docker_tag="${version//+/-}"
          namespace="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"

          if [[ -z "${tag}" ]]; then
            echo "::error::Release tag is required."
            exit 1
          fi

          if ! git check-ref-format "refs/tags/${tag}"; then
            echo "::error::Invalid release tag: ${tag}"
            exit 1
          fi

          if [[ -z "${source_ref}" ]]; then
            echo "::error::Source ref is required."
            exit 1
          fi

          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
          printf 'docker_tag=%s\n' "${docker_tag}" >> "${GITHUB_OUTPUT}"
          printf 'namespace=%s\n' "${namespace}" >> "${GITHUB_OUTPUT}"
          printf 'source_ref=%s\n' "${source_ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout source
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.metadata.outputs.source_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve checked out revision
        id: revision
        shell: bash
        run: printf 'sha=%s\n' "$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag target
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_SHA: ${{ steps.revision.outputs.sha }}
        run: |
          set -euo pipefail

          remote_ref="refs/tags/${RELEASE_TAG}"
          if git ls-remote --exit-code --refs origin "${remote_ref}" >/dev/null; then
            git fetch --force origin "${remote_ref}:${remote_ref}"
            existing_sha="$(git rev-list -n 1 "${remote_ref}")"
            if [[ "${existing_sha}" != "${RELEASE_SHA}" ]]; then
              echo "::error::Tag ${RELEASE_TAG} exists at ${existing_sha}, but this run selected ${RELEASE_SHA}."
              exit 1
            fi
          fi

  quality:
    name: Quality gate
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fixed revision
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: pkg/webadmin/ui/package-lock.json

      - name: Build embedded admin UI
        working-directory: pkg/webadmin/ui
        env:
          APP_VERSION: ${{ needs.prepare.outputs.tag }}
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21.x"
          cache: true

      - name: Verify Go packages
        run: |
          go vet ./...
          go test ./...
          go test -race ./...

      - name: Verify distribution contracts
        run: bash scripts/test-distribution-contract.sh

  artifacts:
    name: Build release archives
    needs: [prepare, quality]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fixed revision
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: pkg/webadmin/ui/package-lock.json

      - name: Build embedded admin UI
        working-directory: pkg/webadmin/ui
        env:
          APP_VERSION: ${{ needs.prepare.outputs.tag }}
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21.x"
          cache: true

      - name: Build cross-platform archives
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          targets=(linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64)

          for component in panel node; do
            for target in "${targets[@]}"; do
              goos="${target%/*}"
              goarch="${target#*/}"
              name="natives3-${component}-${RELEASE_VERSION}-${goos}-${goarch}"
              binary="${component}"
              if [[ "${goos}" == "windows" ]]; then
                binary="${binary}.exe"
              fi

              mkdir -p "dist/${name}/configs" "dist/${name}/docs"
              GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
                go build -trimpath -ldflags "-s -w -X main.version=${RELEASE_TAG}" \
                -o "dist/${name}/${binary}" "./cmd/${component}"

              cp README.md "dist/${name}/"
              cp "configs/${component}.example.yaml" "dist/${name}/configs/"
              cp docs/multi-node-operations.md "dist/${name}/docs/"
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
              rm -rf "dist/${name}"
            done
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum -- *.tar.gz > checksums.txt

      - name: Upload release archives
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          if-no-files-found: error
          retention-days: 7

  images:
    name: Publish ${{ matrix.component }} image
    needs: [prepare, quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [panel, node]

    steps:
      - name: Checkout fixed revision
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: APP_VERSION=${{ needs.prepare.outputs.tag }}
          tags: |
            ${{ needs.prepare.outputs.namespace }}/natives3-${{ matrix.component }}:${{ needs.prepare.outputs.docker_tag }}
            ${{ needs.prepare.outputs.namespace }}/natives3-${{ matrix.component }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}
            org.opencontainers.image.title=NativeS3 ${{ matrix.component }}
          cache-from: type=gha,scope=natives3-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=natives3-${{ matrix.component }}
          provenance: mode=min
          sbom: false

  release:
    name: Publish GitHub Release
    needs: [prepare, artifacts, images]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
