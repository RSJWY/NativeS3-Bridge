name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: pkg/webadmin/ui/package-lock.json

      - name: Build embedded admin UI
        working-directory: pkg/webadmin/ui
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
          cache: true

      - name: Vet Go packages
        run: go vet ./...

      - name: Test Go packages
        run: go test ./...

      - name: Build cross-platform binaries
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="natives3bridge-${version}-${goos}-${goarch}"
            binary="${name}/natives3bridge"

            if [[ "${goos}" == "windows" ]]; then
              binary="${binary}.exe"
            fi

            mkdir -p "dist/${name}/configs"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags "-s -w" \
              -o "dist/${binary}" \
              ./cmd/natives3bridge

            cp README.md "dist/${name}/"
            cp configs/config.example.yaml "dist/${name}/configs/"

            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
