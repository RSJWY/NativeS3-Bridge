server:
  s3_addr: "0.0.0.0:9000"
  admin_addr: "127.0.0.1:9001"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  # Omit admin_tls to inherit server.tls for backward compatibility.
  # Uncomment to enable/disable TLS independently for the admin port.
  # admin_tls:
  #   enabled: false
  #   cert_file: ""
  #   key_file: ""

storage:
  data_root: "./data"
  multipart_tmp: "./data/.multipart"
  metadata_suffix: ".s3meta"
  multipart_gc_interval: "1h"
  multipart_ttl: "24h"
  multipart_max_pending_bytes: 10737418240

database:
  driver: "sqlite"
  dsn: "./natives3.db"
  # mysql:    "user:pass@tcp(127.0.0.1:3306)/natives3?charset=utf8mb4&parseTime=True&loc=Local"
  # postgres: "host=127.0.0.1 user=postgres password=pass dbname=natives3 port=5432 sslmode=disable"

hooks:
  queue_size: 1024
  workers: 4
  max_retry: 3
  timeout: "5s"

webadmin:
  password_hash: ""
  admin_bootstrap_password: ""
  session_secret: "replace-with-random-secret-at-least-32-bytes"
  session_ttl_minutes: 720
  login_max_failures: 5
  login_lockout_window: "15m"
  totp:
    enabled: false
    issuer: "NativeS3-Bridge"
    account: "admin"
    # Generate a base32 TOTP secret out of band for public admin deployments.
    secret: ""
  captcha:
    enabled: false
    provider: "turnstile"
    site_key: ""
    secret_key: ""
    verify_url: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
    timeout: "3s"
  ops:
    public_healthz: true
    public_readyz: false
    public_metrics: false
    # Set a random bearer token to allow Prometheus to scrape /metrics without making it public.
    metrics_token: ""

rate_limit:
  anonymous_rps: 10
  anonymous_burst: 20
  trust_forwarded: false

region: "us-east-1"
log_level: "info"
log:
  dir: ""
  # Docker deployments can use /state/logs. Legacy log.file remains supported but is mutually exclusive with dir.
  max_size_mb: 100
  max_backups: 5
  max_age_days: 14
  compress: false
