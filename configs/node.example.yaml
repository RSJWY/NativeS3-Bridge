# Node configuration (海外节点). The node runs ONLY the S3 data plane plus the
# control-plane agent client; it exposes NO management/admin port (design §1.3).
#
# Safety net B (design §8.3): a legacy config.yaml carrying business fields
# (credentials/buckets/quota/webhooks/rate_limit) still boots — those fields are
# ignored, not rejected. Only the infrastructure fields below are consumed.

server:
  s3_addr: "0.0.0.0:9000"     # S3 data plane listener (the only exposed port)
  tls:
    enabled: false            # terminate S3 TLS here or at a fronting proxy
    cert_file: ""
    key_file: ""

storage:
  data_root: "/data/objects"
  metadata_suffix: ".s3meta"

database:
  driver: "sqlite"
  dsn: "/data/natives3.db"

region: "us-east-1"
log_level: "info"

# Control-plane connection to the panel. The node dials the panel; the panel
# never dials back (design §1.3).
panel:
  node_id: 1                                     # logical node ID assigned by the panel
  register_url: "https://panel.example.com:9443/register"
  agent_url: "wss://panel.example.com:9443/agent"
  registration_token: ""                         # single-use token; only needed on first boot
  cert_file: "/data/pki/node.crt"                # issued after registration
  key_file: "/data/pki/node.key"                 # generated locally on first boot; never uploaded
  ca_file: "/data/pki/panel-ca.crt"              # panel CA to verify the panel server cert
  heartbeat_interval: 15s
