server:
  s3_addr: "0.0.0.0:9000"
  # Containers must listen on all interfaces for Docker port publishing.
  # Keep the host-side port bound to 127.0.0.1 or terminate HTTPS at a trusted proxy.
  admin_addr: "0.0.0.0:9001"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

storage:
  data_root: "/data"
  multipart_tmp: "/state/multipart"
  metadata_suffix: ".s3meta"
  multipart_gc_interval: "1h"
  multipart_ttl: "24h"
  multipart_max_pending_bytes: 10737418240

database:
  driver: "sqlite"
  dsn: "/state/natives3.db"

hooks:
  queue_size: 1024
  workers: 4
  max_retry: 3
  timeout: "5s"

webadmin:
  # Generate a bcrypt hash before enabling admin login, for example:
  #   htpasswd -bnBC 12 "" 'your-strong-password' | tr -d ':\n'
  # Keep this file permission-restricted and paste the resulting hash below.
  # Admin login remains disabled while password_hash is empty.
  password_hash: ""
  admin_bootstrap_password: ""
  session_secret: "replace-with-random-secret-at-least-32-bytes"
  session_ttl_minutes: 720
  login_max_failures: 5
  login_lockout_window: "15m"
  totp:
    enabled: false
    issuer: "NativeS3-Bridge"
    account: "admin"
    secret: ""
  captcha:
    enabled: false
    provider: "turnstile"
    site_key: ""
    secret_key: ""
    verify_url: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
    timeout: "3s"
  ops:
    public_healthz: true
    public_readyz: false
    public_metrics: false
    metrics_token: ""

rate_limit:
  anonymous_rps: 10
  anonymous_burst: 20
  trust_forwarded: false

region: "us-east-1"
log_level: "info"
log:
  file: ""
  # Docker deployments can use /state/logs/natives3bridge.log.
  max_size_mb: 100
  max_backups: 5
  max_age_days: 14
  compress: false
