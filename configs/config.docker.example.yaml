server:
  s3_addr: "0.0.0.0:9000"
  admin_addr: "0.0.0.0:9001"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

storage:
  data_root: "/data"
  multipart_tmp: "/state/multipart"
  metadata_suffix: ".s3meta"
  multipart_gc_interval: "1h"
  multipart_ttl: "24h"

database:
  driver: "sqlite"
  dsn: "/state/natives3.db"

hooks:
  queue_size: 1024
  workers: 4
  max_retry: 3
  timeout: "5s"

webadmin:
  password_hash: ""
  admin_bootstrap_password: "change-me-on-first-start"
  session_secret: "change-me-32bytes-random"
  session_ttl_minutes: 720
  login_max_failures: 5
  login_lockout_window: "15m"

rate_limit:
  anonymous_rps: 10
  anonymous_burst: 20
  trust_forwarded: false

region: "us-east-1"
log_level: "info"
